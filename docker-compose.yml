version: "3.9"

services:
  # ── FastAPI Backend (serves API + HTML pages) ─────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: legalrag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
      - ./legal_analyzer.db:/app/legal_analyzer.db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://legalrag:legalrag_pass@postgres:5432/legalrag
      - VECTOR_DB_PATH=/app/chroma_db
      - UPLOAD_DIR=/app/uploads
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - legalrag-net

  # ── Celery Worker ───────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: legalrag-celery-worker
    command: ["celery", "-A", "backend.services.celery_worker.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://legalrag:legalrag_pass@postgres:5432/legalrag
      - VECTOR_DB_PATH=/app/chroma_db
      - UPLOAD_DIR=/app/uploads
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - legalrag-net

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: legalrag-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - legalrag-net

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: legalrag-postgres
    environment:
      POSTGRES_USER: legalrag
      POSTGRES_PASSWORD: legalrag_pass
      POSTGRES_DB: legalrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalrag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - legalrag-net

volumes:
  pgdata:

networks:
  legalrag-net:
    driver: bridge
